   <style>.container1{

.box{

    width: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    transition: transform 5s ease-in;
}
.box1:hover{
transform: translate(120px,120px);
}
.box2:hover{
transform: translatex(120px);
}
.box3:hover{
transform: translatey(120px);
}
.box4:hover{
    transform:rotate(90deg) ;
}
.box5:hover{
    transform: skewx(40deg);
}
.box6:hover{
    transform: scale(0);
}
.box:hover{
        transform:rotate(90deg) scale(1.5) translatey(120px) ;

}
</style>

</head>
<body>
    <div class="container1">
        <div class="box box1">translate</div>
        <div class="box box2">translateX</div>
        <div class="box box3">translateY</div>
